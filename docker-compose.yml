services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: athena-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: causal-inference
      POSTGRES_USER: ciuser
      POSTGRES_PASSWORD: cipass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ciuser -d causal-inference"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: athena-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: athena-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: causal-inference
      POSTGRES_USER: ciuser
      POSTGRES_PASSWORD: cipass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DJANGO_DEBUG: "True"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure:5
    command: >
      sh -c "echo 'Waiting for PostgreSQL...' &&
             until python -c 'import socket; socket.getaddrinfo(\"postgres\", 5432)' 2>/dev/null; do
               echo 'DNS not ready, retrying in 2s...'; sleep 2;
             done &&
             python manage.py migrate --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"

  frontend:
    build:
      context: ./frontend
    container_name: athena-frontend
    ports:
      - "3000:3000"
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
