services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: athena-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: causal-inference
      POSTGRES_USER: ciuser
      POSTGRES_PASSWORD: cipass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ciuser -d causal-inference"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: athena-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
